services:
  - type: web
    name: no-show-predictor
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: DATABASE_URL
        fromDatabase:
          name: no-show-predictor-db
          property: connectionString
      - key: BOOTSTRAP_DEMO_DATA
        value: "true"

databases:
  - name: no-show-predictor-db
    plan: starter
    databaseName: no_show_predictor
    user: no_show_predictor